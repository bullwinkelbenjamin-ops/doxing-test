<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Bot-Verifizierung</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        .verification-box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            animation: slideIn 0.5s ease-out;
        }

        .stats-box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 30px;
            text-align: left;
            animation: slideIn 0.5s ease-out 0.2s both;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 28px;
        }

        h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 22px;
        }

        h3 {
            color: #333;
            font-size: 16px;
            margin: 15px 0 10px 0;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
        }

        .button-container {
            margin: 30px 0;
        }

        .verify-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 50px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .verify-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
        }

        .verify-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-steps {
            text-align: left;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .step {
            display: flex;
            align-items: center;
            margin: 10px 0;
            font-size: 14px;
            color: #666;
        }

        .step-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 12px;
            font-weight: bold;
        }

        .step.active {
            color: #667eea;
            font-weight: 600;
        }

        .step.completed .step-icon {
            background: #4CAF50;
        }

        .result {
            padding: 25px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 16px;
            font-weight: 600;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result.success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .result.error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .result.warning {
            background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%);
            color: #856404;
            border: 2px solid #ffeeba;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info-item strong {
            display: block;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-item span {
            display: block;
            color: #333;
            font-size: 14px;
            word-break: break-all;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 14px;
            margin: 0 0 10px 0;
            opacity: 0.9;
            color: white;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: bold;
        }

        .score-bar {
            background: #e0e0e0;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50 0%, #8BC34A 100%);
            transition: width 0.6s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .score-fill.low {
            background: linear-gradient(90deg, #f44336 0%, #e91e63 100%);
        }

        .score-fill.medium {
            background: linear-gradient(90deg, #ff9800 0%, #ffc107 100%);
        }

        .detection-list {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .detection-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            font-size: 14px;
            border-bottom: 1px solid #e0e0e0;
        }

        .detection-item:last-child {
            border-bottom: none;
        }

        .detection-icon {
            margin-right: 10px;
            font-size: 16px;
        }

        .detection-icon.yes {
            color: #4CAF50;
        }

        .detection-icon.no {
            color: #f44336;
        }

        .detection-icon.partial {
            color: #ff9800;
        }

        .location-info {
            margin-top: 15px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 8px;
            border-left: 4px solid #2196F3;
        }

        .location-info strong {
            display: block;
            color: #0047ab;
            margin-bottom: 10px;
        }

        .location-info p {
            margin: 5px 0;
            color: #0066cc;
            font-size: 14px;
        }

        .code-block {
            margin-top: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 12px;
            color: #333;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        @media (max-width: 600px) {
            .verification-box {
                padding: 25px;
            }
            .stats-box {
                padding: 20px;
            }
            h1 {
                font-size: 24px;
            }
            .verify-button {
                padding: 12px 40px;
                font-size: 14px;
            }
            .info-grid,
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="verification-box">
            <h1>🔐 Advanced Bot-Verifizierung</h1>
            <p>Umfassende Sicherheitsanalyse - Klick um zu starten</p>
            
            <div class="button-container">
                <button id="verifyBtn" class="verify-button">🔍 Verifizierung starten</button>
            </div>
            
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Detaillierte Analyse wird durchgeführt...</p>
                <div class="loading-steps">
                    <div class="step" id="step-behavior">
                        <div class="step-icon">1</div>
                        <span>Verhaltensanalyse</span>
                    </div>
                    <div class="step" id="step-device">
                        <div class="step-icon">2</div>
                        <span>Geräte-Fingerprinting</span>
                    </div>
                    <div class="step" id="step-network">
                        <div class="step-icon">3</div>
                        <span>Netzwerk-Analyse</span>
                    </div>
                    <div class="step" id="step-browser">
                        <div class="step-icon">4</div>
                        <span>Browser-Forensik</span>
                    </div>
                    <div class="step" id="step-location">
                        <div class="step-icon">5</div>
                        <span>Geo-Lokalisierung</span>
                    </div>
                </div>
            </div>
            
            <div id="result" class="result" style="display: none;"></div>
        </div>

        <div id="statsBox" class="stats-box" style="display: none;">
            <h2>📊 Vollständige Analyseergebnisse</h2>
            <div id="statsContent"></div>
        </div>
    </div>

    <script>
        class AdvancedVerification {
            constructor() {
                this.verifyBtn = document.getElementById('verifyBtn');
                this.loading = document.getElementById('loading');
                this.result = document.getElementById('result');
                this.statsBox = document.getElementById('statsBox');
                this.statsContent = document.getElementById('statsContent');
                
                this.verificationData = {
                    timestamp: null,
                    userAgent: navigator.userAgent,
                    ipAddress: null,
                    location: null,
                    isVerified: false,
                    botScore: 0,
                    detections: {},
                    rawData: {}
                };
                
                this.init();
            }
            
            init() {
                this.verifyBtn.addEventListener('click', () => this.startVerification());
            }
            
            async startVerification() {
                this.verifyBtn.disabled = true;
                this.loading.style.display = 'block';
                this.result.style.display = 'none';
                this.statsBox.style.display = 'none';
                
                try {
                    this.verificationData.timestamp = new Date().toISOString();
                    
                    // Schritt 1: Verhaltensanalyse
                    this.updateStep('step-behavior', 'active');
                    await this.sleep(500);
                    const behaviorScore = await this.analyzeBehavior();
                    this.updateStep('step-behavior', 'completed');
                    
                    // Schritt 2: Geräte-Fingerprinting
                    this.updateStep('step-device', 'active');
                    await this.sleep(500);
                    this.captureDeviceFingerprint();
                    this.updateStep('step-device', 'completed');
                    
                    // Schritt 3: Netzwerk-Analyse
                    this.updateStep('step-network', 'active');
                    await this.sleep(500);
                    await this.analyzeNetwork();
                    this.updateStep('step-network', 'completed');
                    
                    // Schritt 4: Browser-Forensik
                    this.updateStep('step-browser', 'active');
                    await this.sleep(500);
                    this.analyzeBrowserForensics();
                    this.updateStep('step-browser', 'completed');
                    
                    // Schritt 5: Geo-Lokalisierung
                    this.updateStep('step-location', 'active');
                    await this.sleep(500);
                    await this.getLocation();
                    this.updateStep('step-location', 'completed');
                    
                    // Berechne finalen Score
                    this.calculateFinalScore(behaviorScore);
                    this.showSuccess();
                    
                } catch (error) {
                    console.error('Verifizierungsfehler:', error);
                    this.showError('Ein Fehler ist aufgetreten: ' + error.message);
                }
            }
            
            updateStep(stepId, status) {
                const step = document.getElementById(stepId);
                step.classList.remove('active', 'completed');
                if (status) step.classList.add(status);
            }
            
            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
            
            async analyzeBehavior() {
                const mouseEvents = [];
                const clickEvents = [];
                let touchSupport = false;
                
                const trackMouse = (e) => {
                    mouseEvents.push({
                        x: e.clientX,
                        y: e.clientY,
                        time: Date.now()
                    });
                };
                
                const trackClick = (e) => {
                    clickEvents.push({
                        time: Date.now(),
                        x: e.clientX,
                        y: e.clientY
                    });
                };
                
                document.addEventListener('mousemove', trackMouse);
                document.addEventListener('click', trackClick);
                
                touchSupport = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
                
                await this.sleep(1000);
                
                document.removeEventListener('mousemove', trackMouse);
                document.removeEventListener('click', trackClick);
                
                this.verificationData.detections.mouseMovement = mouseEvents.length > 5 ? 0.3 : -0.2;
                this.verificationData.detections.clickBehavior = clickEvents.length > 0 ? 0.2 : -0.1;
                this.verificationData.detections.touchSupport = touchSupport ? 0.3 : -0.1;
                
                this.verificationData.rawData.mouseEvents = mouseEvents.length;
                this.verificationData.rawData.clickEvents = clickEvents.length;
                this.verificationData.rawData.touchSupport = touchSupport;
                
                const score = (0.3 + 0.2 + (touchSupport ? 0.3 : 0)) / 3;
                return score;
            }
            
            captureDeviceFingerprint() {
                const fingerprint = {
                    screen: {
                        width: window.screen.width,
                        height: window.screen.height,
                        colorDepth: window.screen.colorDepth,
                        pixelDepth: window.screen.pixelDepth,
                        devicePixelRatio: window.devicePixelRatio
                    },
                    navigator: {
                        language: navigator.language,
                        languages: navigator.languages,
                        platform: navigator.platform,
                        hardwareConcurrency: navigator.hardwareConcurrency,
                        deviceMemory: navigator.deviceMemory,
                        maxTouchPoints: navigator.maxTouchPoints,
                        vendor: navigator.vendor,
                        plugins: navigator.plugins.length,
                        doNotTrack: navigator.doNotTrack
                    },
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    canvas: this.getCanvasFingerprint(),
                    webgl: this.getWebGLInfo()
                };
                
                this.verificationData.rawData.fingerprint = fingerprint;
                this.verificationData.detections.deviceConsistency = 0.4;
            }
            
            getCanvasFingerprint() {
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    ctx.textBaseline = 'top';
                    ctx.font = '14px Arial';
                    ctx.fillText('Canvas Test', 2, 2);
                    return canvas.toDataURL().substring(0, 50) + '...';
                } catch (e) {
                    return 'Nicht verfügbar';
                }
            }
            
            getWebGLInfo() {
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        return {
                            vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL),
                            renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)
                        };
                    }
                    return 'Nicht verfügbar';
                } catch (e) {
                    return 'Nicht verfügbar';
                }
            }
            
            async analyzeNetwork() {
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    this.verificationData.ipAddress = data.ip;
                    this.verificationData.detections.networkDetection = 0.3;
                } catch (error) {
                    this.verificationData.ipAddress = 'Nicht verfügbar';
                    this.verificationData.detections.networkDetection = -0.1;
                }
                
                this.verificationData.rawData.connectionType = navigator.connection?.effectiveType || 'Unbekannt';
                this.verificationData.rawData.bandwidthEstimate = navigator.connection?.downlink || 'Unbekannt';
                this.verificationData.rawData.onLine = navigator.onLine;
            }
            
            analyzeBrowserForensics() {
                const forensics = {
                    userAgent: navigator.userAgent,
                    appVersion: navigator.appVersion,
                    cookieEnabled: navigator.cookieEnabled,
                    localStorageEnabled: this.isLocalStorageEnabled(),
                    sessionStorageEnabled: this.isSessionStorageEnabled(),
                    indexedDBEnabled: this.isIndexedDBEnabled(),
                    webWorkerSupport: typeof(Worker) !== 'undefined',
                    serviceWorkerSupport: 'serviceWorker' in navigator,
                    notificationSupport: 'Notification' in window,
                    geolocationSupport: 'geolocation' in navigator,
                    vibrationSupport: 'vibrate' in navigator,
                    batterySupport: 'getBattery' in navigator,
                    cameraSupport: navigator.mediaDevices !== undefined
                };
                
                this.verificationData.rawData.forensics = forensics;
                
                const supportedFeatures = Object.values(forensics).filter(v => v === true).length;
                this.verificationData.detections.browserFeatures = (supportedFeatures / Object.keys(forensics).length) * 0.3;
            }
            
            isLocalStorageEnabled() {
                try {
                    const test = '__test__';
                    localStorage.setItem(test, test);
                    localStorage.removeItem(test);
                    return true;
                } catch(e) {
                    return false;
                }
            }
            
            isSessionStorageEnabled() {
                try {
                    const test = '__test__';
                    sessionStorage.setItem(test, test);
                    sessionStorage.removeItem(test);
                    return true;
                } catch(e) {
                    return false;
                }
            }
            
            isIndexedDBEnabled() {
                return !!window.indexedDB;
            }
            
            async getLocation() {
                return new Promise((resolve) => {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                this.verificationData.location = {
                                    latitude: position.coords.latitude.toFixed(4),
                                    longitude: position.coords.longitude.toFixed(4),
                                    accuracy: Math.round(position.coords.accuracy) + 'm',
                                    altitude: position.coords.altitude ? Math.round(position.coords.altitude) + 'm' : 'N/A',
                                    speed: position.coords.speed ? Math.round(position.coords.speed) + ' m/s' : 'N/A',
                                    heading: position.coords.heading ? Math.round(position.coords.heading) + '°' : 'N/A'
                                };
                                this.verificationData.detections.geoLocation = 0.2;
                                resolve();
                            },
                            (error) => {
                                this.verificationData.location = {
                                    status: 'Berechtigung verweigert',
                                    error: error.message
                                };
                                this.verificationData.detections.geoLocation = -0.1;
                                resolve();
                            },
                            { timeout: 5000, enableHighAccuracy: true }
                        );
                    } else {
                        this.verificationData.location = {
                            status: 'Nicht unterstützt',
                            message: 'Geolocation wird nicht vom Browser unterstützt'
                        };
                        this.verificationData.detections.geoLocation = -0.1;
                        resolve();
                    }
                });
            }
            
            calculateFinalScore(behaviorScore) {
                let factors = [
                    behaviorScore * 0.2,
                    (this.verificationData.detections.mouseMovement + 0.2) * 0.15,
                    (this.verificationData.detections.touchSupport + 0.1) * 0.2,
                    (this.verificationData.detections.deviceConsistency + 0.1) * 0.15,
                    (this.verificationData.detections.networkDetection || 0) * 0.1,
                    (this.verificationData.detections.browserFeatures || 0) * 0.1,
                    (this.verificationData.detections.geoLocation || 0) * 0.1
                ];
                
                const averageScore = Math.max(0, Math.min(1, factors.reduce((a, b) => a + b, 0)));
                this.verificationData.botScore = Math.round(averageScore * 100);
                this.verificationData.isVerified = this.verificationData.botScore > 45;
            }
            
            showSuccess() {
                const isLikelyBot = this.verificationData.botScore < 50;
                
                this.result.innerHTML = `
                    <div class="result ${this.verificationData.isVerified ? 'success' : 'warning'}">
                        ${this.verificationData.isVerified ? '✓ Verifizierung erfolgreich!' : '⚠ Verdächtige Aktivität erkannt'}
                        ${isLikelyBot ? '<br><small>Warnung: Mögliches Bot-Verhalten erkannt</small>' : ''}
                    </div>
                `;
                this.result.style.display = 'block';
                
                this.displayStats();
            }
            
            displayStats() {
                const fp = this.verificationData.rawData.fingerprint;
                const forensics = this.verificationData.rawData.forensics;
                
                const scoreLevel = this.verificationData.botScore > 70 ? '✅ Legitim' : (this.verificationData.botScore > 45 ? '⚠️ Verdächtig' : '🚫 Wahrscheinlich Bot');
                
                let html = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>Gesamt Bot-Score</h3>
                            <div class="value">${this.verificationData.botScore}%</div>
                            <div style="margin-top: 10px;">
                                <div class="score-bar">
                                    <div class="score-fill ${this.verificationData.botScore > 70 ? '' : (this.verificationData.botScore > 45 ? 'medium' : 'low')}" style="width: ${this.verificationData.botScore}%">
                                        ${this.verificationData.botScore}%
                                    </div>
                                </div>
                                <small>${scoreLevel}</small>
                            </div>
                        </div>
                        
                        <div class="stat-card">
                            <h3>Verifizierungsstatus</h3>
                            <div class="value">${this.verificationData.isVerified ? '✓ PASS' : '✗ FAIL'}</div>
                        </div>
                    </div>
                    
                    <h3>🔍 Detektionsergebnisse</h3>
                    <div class="detection-list">
                        <div class="detection-item">
                            <span class="detection-icon yes">✓</span>
                            <span><strong>Mausbewegung erkannt:</strong> ${this.verificationData.rawData.mouseEvents} Ereignisse</span>
                        </div>
                        <div class="detection-item">
                            <span class="detection-icon ${this.verificationData.rawData.touchSupport ? 'yes' : 'no'}">✓</span>
                            <span><strong>Touch-Support:</strong> ${this.verificationData.rawData.touchSupport ? 'JA' : 'NEIN'}</span>
                        </div>
                        <div class="detection-item">
                            <span class="detection-icon ${this.verificationData.rawData.clickEvents > 0 ? 'yes' : 'no'}">✓</span>
                            <span><strong>Klicks erkannt:</strong> ${this.verificationData.rawData.clickEvents} Ereignisse</span>
                        </div>
                        <div class="detection-item">
                            <span class="detection-icon yes">✓</span>
                            <span><strong>IP-Adresse:</strong> ${this.verificationData.ipAddress}</span>
                        </div>
                        <div class="detection-item">
                            <span class="detection-icon yes">✓</span>
                            <span><strong>Connection Type:</strong> ${this.verificationData.rawData.connectionType}</span>
                        </div>
                        <div class="detection-item">
                            <span class="detection-icon ${this.verificationData.rawData.forensics.cookieEnabled ? 'yes' : 'no'}">✓</span>
                            <span><strong>Cookies aktiviert:</strong> ${this.verificationData.rawData.forensics.cookieEnabled ? 'JA' : 'NEIN'}</span>
                        </div>
                        <div class="detection-item">
                            <span class="detection-icon ${this.verificationData.rawData.forensics.localStorageEnabled ? 'yes' : 'no'}">✓</span>
                            <span><strong>LocalStorage:</strong> ${this.verificationData.rawData.forensics.localStorageEnabled ? 'JA' : 'NEIN'}</span>
                        </div>
                        <div class="detection-item">
                            <span class="detection-icon ${this.verificationData.rawData.forensics.serviceWorkerSupport ? 'yes' : 'no'}">✓</span>
                            <span><strong>Service Worker:</strong> ${this.verificationData.rawData.forensics.serviceWorkerSupport ? 'JA' : 'NEIN'}</span>
                        </div>
                    </div>
                    
                    <h3>🖥️ Geräte-Informationen</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <strong>Bildschirmauflösung</strong>
                            <span>${fp.screen.width} x ${fp.screen.height}</span>
                        </div>
                        <div class="info-item">
                            <strong>Farb-Tiefe</strong>
                            <span>${fp.screen.colorDepth}-bit</span>
                        </div>
                        <div class="info-item">
                            <strong>Plattform</strong>
                            <span>${fp.navigator.platform}</span>
                        </div>
                        <div class="info-item">
                            <strong>Sprache</strong>
                            <span>${fp.navigator.language}</span>
                        </div>
                        <div class="info-item">
                            <strong>CPU Kerne</strong>
                            <span>${fp.navigator.hardwareConcurrency}</span>
                        </div>
                        <div class="info-item">
                            <strong>Gerätespeicher</strong>
                            <span>${fp.navigator.deviceMemory}GB</span>
                        </div>
                        <div class="info-item">
                            <strong>Zeitzone</strong>
                            <span>${fp.timezone}</span>
                        </div>
                        <div class="info-item">
                            <strong>Browser Vendor</strong>
                            <span>${fp.navigator.vendor}</span>
                        </div>
                    </div>
                    
                    <h3>📍 Standort & Netzwerk</h3>
                `;
                
                if (this.verificationData.location && this.verificationData.location.latitude) {
                    html += `
                        <div class="location-info">
                            <strong>📍 GPS-Standort:</strong>
                            <p>Breitengrad: <strong>${this.verificationData.location.latitude}</strong></p>
                            <p>Längengrad: <strong>${this.verificationData.location.longitude}</strong></p>
                            <p>Genauigkeit: <strong>${this.verificationData.location.accuracy}</strong></p>
                            <p>Höhe: <strong>${this.verificationData.location.altitude}</strong></p>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="location-info">
                            <strong>📍 GPS-Standort:</strong>
                            <p>${this.verificationData.location?.status || 'Nicht verfügbar'}</p>
                        </div>
                    `;
                }
                
                html += `
                    <h3>🔐 User Agent & Forensik</h3>
                    <div class="code-block">
                        ${this.verificationData.userAgent}
                    </div>
                    
                    <div style="margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 8px; border-left: 4px solid #4CAF50;">
                        <strong style="color: #2e7d32;">📊 Analyseergebnis:</strong>
                        <p style="margin-top: 10px; color: #2e7d32;">
                            Basierend auf ${Object.keys(this.verificationData.detections).length} verschiedenen Analysemethoden wurde ein Bot-Score von <strong>${this.verificationData.botScore}%</strong> berechnet.
                        </p>
                    </div>
                `;
                
                this.statsContent.innerHTML = html;
                this.statsBox.style.display = 'block';
                this.loading.style.display = 'none';
            }
            
            showError(message) {
                this.result.innerHTML = `
                    <div class="result error">
                        ✗ ${message}
                    </div>
                `;
                this.result.style.display = 'block';
                this.loading.style.display = 'none';
                this.verifyBtn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new AdvancedVerification();
        });
    </script>
</body>
</html>
