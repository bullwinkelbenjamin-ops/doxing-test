<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .verification-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .verification-box:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12);
        }

        h1 {
            color: #ffffff;
            font-size: 32px;
            font-weight: 300;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .verify-button {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 48px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .verify-button:hover {
            background: linear-gradient(135deg, #2a5298 0%, #3a6db3 100%);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .verify-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #2a5298;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #888;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .result {
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            border: 1px solid;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.success {
            background: rgba(76, 175, 80, 0.05);
            border-color: rgba(76, 175, 80, 0.2);
            color: #81c784;
        }

        .result.error {
            background: rgba(244, 67, 54, 0.05);
            border-color: rgba(244, 67, 54, 0.2);
            color: #e57373;
        }

        .stats-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 40px;
            animation: slideUp 0.5s ease;
            max-height: 85vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stats-box::-webkit-scrollbar {
            width: 6px;
        }

        .stats-box::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .stats-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        .stats-box::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        h2 {
            color: #ffffff;
            font-size: 18px;
            font-weight: 500;
            margin: 32px 0 24px 0;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.5px;
        }

        h2:first-child {
            margin-top: 0;
        }

        .section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .info-row {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 24px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            align-items: center;
        }

        .info-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-label {
            font-weight: 500;
            color: #a0a0a0;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .info-value {
            color: #e0e0e0;
            font-size: 14px;
            word-break: break-all;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
        }

        .info-value.positive {
            color: #81c784;
        }

        .info-value.warning {
            color: #ffb74d;
        }

        .info-value.negative {
            color: #e57373;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .badge.safe {
            background: rgba(76, 175, 80, 0.1);
            color: #81c784;
            border: 1px solid rgba(76, 175, 80, 0.2);
        }

        .badge.warning {
            background: rgba(255, 193, 7, 0.1);
            color: #ffb74d;
            border: 1px solid rgba(255, 193, 7, 0.2);
        }

        .badge.danger {
            background: rgba(244, 67, 54, 0.1);
            color: #e57373;
            border: 1px solid rgba(244, 67, 54, 0.2);
        }

        .code-block {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            padding: 16px;
            margin: 16px 0;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            color: #81c784;
            word-break: break-all;
            max-height: 120px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .icon {
            display: inline-block;
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .verification-box {
                padding: 40px 24px;
            }

            h1 {
                font-size: 24px;
            }

            .verify-button {
                padding: 12px 36px;
                font-size: 13px;
            }

            .stats-box {
                padding: 24px;
            }

            h2 {
                font-size: 16px;
                margin: 24px 0 16px 0;
            }

            .info-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .info-label {
                margin-bottom: 4px;
            }

            .section {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="verification-box">
            <h1>Security Verification</h1>
            <div class="subtitle">System Identity Analysis</div>
            
            <button id="verifyBtn" class="verify-button">VERIFY IDENTITY</button>
            
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <div class="loading-text">Analyzing system data...</div>
            </div>
            
            <div id="result" class="result" style="display: none;"></div>
        </div>

        <div id="statsBox" class="stats-box" style="display: none;">
            <div id="statsContent"></div>
        </div>
    </div>

    <script>
        class SecurityVerification {
            constructor() {
                this.verifyBtn = document.getElementById('verifyBtn');
                this.loading = document.getElementById('loading');
                this.result = document.getElementById('result');
                this.statsBox = document.getElementById('statsBox');
                this.statsContent = document.getElementById('statsContent');
                
                this.userData = {};
                this.init();
            }
            
            init() {
                this.verifyBtn.addEventListener('click', () => this.startAnalysis());
            }
            
            async startAnalysis() {
                this.verifyBtn.disabled = true;
                this.loading.style.display = 'block';
                this.result.style.display = 'none';
                this.statsBox.style.display = 'none';
                
                try {
                    await Promise.all([
                        this.getNetworkInfo(),
                        this.getGeoLocation(),
                        this.captureDeviceFingerprint(),
                        this.getBrowserForensics(),
                        this.getSecurityAnalysis()
                    ]);
                    
                    await this.sleep(1500);
                    this.displayResults();
                    
                } catch (error) {
                    console.error('Error:', error);
                    this.showError('Verification failed: ' + error.message);
                }
            }
            
            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
            
            async getNetworkInfo() {
                try {
                    const response = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(5000) });
                    const data = await response.json();
                    
                    this.userData.network = {
                        ip: data?.ip || 'Unknown',
                        isp: data?.org || 'Unknown',
                        country: data?.country_name || 'Unknown',
                        country_code: data?.country_code || '??',
                        region: data?.region || 'Unknown',
                        city: data?.city || 'Unknown',
                        latitude: data?.latitude || 0,
                        longitude: data?.longitude || 0,
                        timezone: data?.timezone || 'Unknown',
                        postal: data?.postal || 'Unknown',
                        asn: data?.asn || 'Unknown',
                        is_vpn: (data?.is_vpn === true ? 'Yes' : 'No') || 'No',
                        is_proxy: (data?.is_proxy === true ? 'Yes' : 'No') || 'No',
                        is_tor: (data?.is_tor === true ? 'Yes' : 'No') || 'No',
                        is_datacenter: (data?.is_datacenter === true ? 'Yes' : 'No') || 'No',
                        connection_type: data?.connection_type || 'Unknown',
                        currency: data?.currency_code || 'Unknown'
                    };
                } catch (error) {
                    this.userData.network = { 
                        error: true,
                        ip: 'Unavailable',
                        isp: 'Unknown'
                    };
                }
            }
            
            async getGeoLocation() {
                return new Promise((resolve) => {
                    const timeout = setTimeout(() => {
                        this.userData.gps = { status: 'Timeout' };
                        resolve();
                    }, 5000);
                    
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                clearTimeout(timeout);
                                this.userData.gps = {
                                    latitude: position.coords.latitude?.toFixed(6) || 'Unknown',
                                    longitude: position.coords.longitude?.toFixed(6) || 'Unknown',
                                    accuracy: Math.round(position.coords.accuracy) + 'm',
                                    altitude: position.coords.altitude ? Math.round(position.coords.altitude) + 'm' : 'N/A',
                                    speed: position.coords.speed ? Math.round(position.coords.speed * 3.6) + ' km/h' : 'N/A',
                                    heading: position.coords.heading ? Math.round(position.coords.heading) + '°' : 'N/A'
                                };
                                resolve();
                            },
                            (error) => {
                                clearTimeout(timeout);
                                this.userData.gps = { status: 'Permission Denied' };
                                resolve();
                            },
                            { timeout: 5000, enableHighAccuracy: true }
                        );
                    } else {
                        clearTimeout(timeout);
                        this.userData.gps = { status: 'Not Supported' };
                        resolve();
                    }
                });
            }
            
            captureDeviceFingerprint() {
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    if (ctx) {
                        ctx.textBaseline = 'top';
                        ctx.font = '14px Arial';
                        ctx.fillText('⚙️', 2, 2);
                    }
                    const canvasHash = canvas.toDataURL().substring(0, 50);
                    
                    this.userData.device = {
                        userAgent: navigator?.userAgent || 'Unknown',
                        platform: navigator?.platform || 'Unknown',
                        hardwareConcurrency: navigator?.hardwareConcurrency || 'Unknown',
                        deviceMemory: navigator?.deviceMemory ? navigator.deviceMemory + 'GB' : 'Unknown',
                        maxTouchPoints: navigator?.maxTouchPoints || 0,
                        vendor: navigator?.vendor || 'Unknown',
                        language: navigator?.language || 'Unknown',
                        languages: navigator?.languages ? navigator.languages.join(', ') : navigator?.language || 'Unknown',
                        screenWidth: window?.screen?.width || 0,
                        screenHeight: window?.screen?.height || 0,
                        colorDepth: (window?.screen?.colorDepth || 0) + '-bit',
                        pixelDepth: (window?.screen?.pixelDepth || 0) + '-bit',
                        devicePixelRatio: window?.devicePixelRatio || 1,
                        timezone: Intl?.DateTimeFormat?.()?.resolvedOptions?.()?.timeZone || 'Unknown',
                        canvasFingerprint: canvasHash,
                        plugins: this.getPlugins(),
                        webGL: this.getWebGLInfo()
                    };
                } catch (error) {
                    this.userData.device = { error: 'Fingerprint Error' };
                }
            }
            
            getPlugins() {
                try {
                    const plugins = [];
                    if (navigator?.plugins) {
                        for (let i = 0; i < navigator.plugins.length; i++) {
                            plugins.push(navigator.plugins[i]?.name || 'Plugin');
                        }
                    }
                    return plugins.length > 0 ? plugins.join(', ') : 'None';
                } catch (error) {
                    return 'Unknown';
                }
            }
            
            getWebGLInfo() {
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        if (debugInfo) {
                            return {
                                vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) || 'Unknown',
                                renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) || 'Unknown'
                            };
                        }
                    }
                    return 'Not Available';
                } catch (e) {
                    return 'Not Available';
                }
            }
            
            getBrowserForensics() {
                try {
                    this.userData.browser = {
                        cookieEnabled: navigator?.cookieEnabled || false,
                        doNotTrack: navigator?.doNotTrack || 'Unknown',
                        onLine: navigator?.onLine !== undefined ? navigator.onLine : true,
                        connectionType: navigator?.connection?.effectiveType || 'Unknown',
                        bandwidth: navigator?.connection?.downlink ? navigator.connection.downlink + ' Mbps' : 'Unknown',
                        localStorage: this.checkLocalStorage(),
                        sessionStorage: this.checkSessionStorage(),
                        indexedDB: this.checkIndexedDB(),
                        serviceWorker: 'serviceWorker' in navigator ? 'Yes' : 'No',
                        notifications: 'Notification' in window ? 'Yes' : 'No',
                        geolocation: 'geolocation' in navigator ? 'Yes' : 'No',
                        vibration: 'vibrate' in navigator ? 'Yes' : 'No',
                        webWorker: typeof(Worker) !== 'undefined' ? 'Yes' : 'No',
                        webSocket: 'WebSocket' in window ? 'Yes' : 'No',
                        webRTC: this.checkWebRTC()
                    };
                } catch (error) {
                    this.userData.browser = { error: 'Forensics Error' };
                }
            }
            
            checkLocalStorage() {
                try {
                    const test = '__test__';
                    localStorage.setItem(test, test);
                    localStorage.removeItem(test);
                    return 'Yes';
                } catch(e) {
                    return 'No';
                }
            }
            
            checkSessionStorage() {
                try {
                    const test = '__test__';
                    sessionStorage.setItem(test, test);
                    sessionStorage.removeItem(test);
                    return 'Yes';
                } catch(e) {
                    return 'No';
                }
            }
            
            checkIndexedDB() {
                try {
                    return !!window.indexedDB ? 'Yes' : 'No';
                } catch (e) {
                    return 'No';
                }
            }
            
            checkWebRTC() {
                try {
                    const pc = new (window.RTCPeerConnection || window.webkitRTCPeerConnection)({iceServers: []});
                    pc.createDataChannel('');
                    pc.createOffer();
                    return 'Yes';
                } catch (e) {
                    return 'No';
                }
            }
            
            getSecurityAnalysis() {
                try {
                    this.userData.security = {
                        httpsConnection: location.protocol === 'https:' ? 'Yes' : 'No',
                        referrerPolicy: document.referrerPolicy || 'default'
                    };
                } catch (error) {
                    this.userData.security = { error: 'Security Error' };
                }
            }
            
            displayResults() {
                let html = '';
                
                if (this.userData.network && !this.userData.network.error) {
                    html += `
                        <h2><span class="icon">🌐</span> Network Information</h2>
                        <div class="section">
                            <div class="info-row">
                                <div class="info-label">IP Address</div>
                                <div class="info-value">${this.userData.network?.ip || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Internet Provider</div>
                                <div class="info-value">${this.userData.network?.isp || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">ASN</div>
                                <div class="info-value">${this.userData.network?.asn || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Connection Type</div>
                                <div class="info-value">${this.userData.network?.connection_type || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">VPN Detected</div>
                                <div class="info-value ${this.userData.network?.is_vpn === 'Yes' ? 'warning' : 'positive'}">
                                    ${this.userData.network?.is_vpn === 'Yes' ? '<span class="badge warning">Yes</span>' : '<span class="badge safe">No</span>'}
                                </div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Proxy Detected</div>
                                <div class="info-value ${this.userData.network?.is_proxy === 'Yes' ? 'warning' : 'positive'}">
                                    ${this.userData.network?.is_proxy === 'Yes' ? '<span class="badge warning">Yes</span>' : '<span class="badge safe">No</span>'}
                                </div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Tor Detected</div>
                                <div class="info-value ${this.userData.network?.is_tor === 'Yes' ? 'negative' : 'positive'}">
                                    ${this.userData.network?.is_tor === 'Yes' ? '<span class="badge danger">Yes</span>' : '<span class="badge safe">No</span>'}
                                </div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Datacenter IP</div>
                                <div class="info-value ${this.userData.network?.is_datacenter === 'Yes' ? 'warning' : 'positive'}">
                                    ${this.userData.network?.is_datacenter === 'Yes' ? '<span class="badge warning">Yes</span>' : '<span class="badge safe">No</span>'}
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                if (this.userData.network && !this.userData.network.error) {
                    html += `
                        <h2><span class="icon">📍</span> Location Information</h2>
                        <div class="section">
                            <div class="info-row">
                                <div class="info-label">Country</div>
                                <div class="info-value">${this.userData.network?.country || 'Unknown'} (${this.userData.network?.country_code || '??'})</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Region</div>
                                <div class="info-value">${this.userData.network?.region || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">City</div>
                                <div class="info-value">${this.userData.network?.city || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Postal Code</div>
                                <div class="info-value">${this.userData.network?.postal || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Latitude</div>
                                <div class="info-value">${this.userData.network?.latitude?.toFixed?.(4) || this.userData.network?.latitude || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Longitude</div>
                                <div class="info-value">${this.userData.network?.longitude?.toFixed?.(4) || this.userData.network?.longitude || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Timezone</div>
                                <div class="info-value">${this.userData.network?.timezone || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Currency</div>
                                <div class="info-value">${this.userData.network?.currency || 'Unknown'}</div>
                            </div>
                        </div>
                    `;
                }
                
                if (this.userData.gps && this.userData.gps.latitude) {
                    html += `
                        <h2><span class="icon">📡</span> GPS Location</h2>
                        <div class="section">
                            <div class="info-row">
                                <div class="info-label">Latitude</div>
                                <div class="info-value">${this.userData.gps.latitude}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Longitude</div>
                                <div class="info-value">${this.userData.gps.longitude}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Accuracy</div>
                                <div class="info-value">${this.userData.gps.accuracy}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Altitude</div>
                                <div class="info-value">${this.userData.gps.altitude}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Speed</div>
                                <div class="info-value">${this.userData.gps.speed}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Heading</div>
                                <div class="info-value">${this.userData.gps.heading}</div>
                            </div>
                        </div>
                    `;
                }
                
                if (this.userData.device && !this.userData.device.error) {
                    html += `
                        <h2><span class="icon">📱</span> Device Information</h2>
                        <div class="section">
                            <div class="info-row">
                                <div class="info-label">Operating System</div>
                                <div class="info-value">${this.userData.device?.platform || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">CPU Cores</div>
                                <div class="info-value">${this.userData.device?.hardwareConcurrency || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Device Memory</div>
                                <div class="info-value">${this.userData.device?.deviceMemory || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Screen Resolution</div>
                                <div class="info-value">${this.userData.device?.screenWidth || 0} × ${this.userData.device?.screenHeight || 0}px</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Color Depth</div>
                                <div class="info-value">${this.userData.device?.colorDepth || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Pixel Ratio</div>
                                <div class="info-value">${this.userData.device?.devicePixelRatio || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Touch Points</div>
                                <div class="info-value">${this.userData.device?.maxTouchPoints || 0}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Timezone</div>
                                <div class="info-value">${this.userData.device?.timezone || 'Unknown'}</div>
                            </div>
                        </div>
                    `;
                }
                
                if (this.userData.device && !this.userData.device.error) {
                    html += `
                        <h2><span class="icon">🌐</span> Browser Information</h2>
                        <div class="section">
                            <div class="info-row">
                                <div class="info-label">Browser Vendor</div>
                                <div class="info-value">${this.userData.device?.vendor || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Language</div>
                                <div class="info-value">${this.userData.device?.language || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">All Languages</div>
                                <div class="info-value">${this.userData.device?.languages || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Browser Plugins</div>
                                <div class="info-value">${this.userData.device?.plugins || 'None'}</div>
                            </div>
                        </div>
                    `;
                }
                
                if (this.userData.browser && !this.userData.browser.error) {
                    html += `
                        <h2><span class="icon">⚙️</span> Browser Features</h2>
                        <div class="section">
                            <div class="info-row">
                                <div class="info-label">Cookies Enabled</div>
                                <div class="info-value ${this.userData.browser?.cookieEnabled ? 'positive' : 'negative'}">
                                    ${this.userData.browser?.cookieEnabled ? '<span class="badge safe">Yes</span>' : '<span class="badge danger">No</span>'}
                                </div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Online Status</div>
                                <div class="info-value ${this.userData.browser?.onLine ? 'positive' : 'negative'}">
                                    ${this.userData.browser?.onLine ? '<span class="badge safe">Online</span>' : '<span class="badge danger">Offline</span>'}
                                </div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Connection Type</div>
                                <div class="info-value">${this.userData.browser?.connectionType || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Bandwidth</div>
                                <div class="info-value">${this.userData.browser?.bandwidth || 'Unknown'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">LocalStorage</div>
                                <div class="info-value positive">${this.userData.browser?.localStorage === 'Yes' ? '<span class="badge safe">Yes</span>' : '<span class="badge danger">No</span>'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">SessionStorage</div>
                                <div class="info-value positive">${this.userData.browser?.sessionStorage === 'Yes' ? '<span class="badge safe">Yes</span>' : '<span class="badge danger">No</span>'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">IndexedDB</div>
                                <div class="info-value positive">${this.userData.browser?.indexedDB === 'Yes' ? '<span class="badge safe">Yes</span>' : '<span class="badge danger">No</span>'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Service Worker</div>
                                <div class="info-value">${this.userData.browser?.serviceWorker || 'No'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Geolocation</div>
                                <div class="info-value">${this.userData.browser?.geolocation || 'No'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Web Worker</div>
                                <div class="info-value">${this.userData.browser?.webWorker || 'No'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">WebSocket</div>
                                <div class="info-value">${this.userData.browser?.webSocket || 'No'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">WebRTC</div>
                                <div class="info-value">${this.userData.browser?.webRTC || 'No'}</div>
                            </div>
                        </div>
                    `;
                }
                
                if (this.userData.security && !this.userData.security.error) {
                    html += `
                        <h2><span class="icon">🔐</span> Security Analysis</h2>
                        <div class="section">
                            <div class="info-row">
                                <div class="info-label">HTTPS Connection</div>
                                <div class="info-value ${this.userData.security?.httpsConnection === 'Yes' ? 'positive' : 'negative'}">
                                    ${this.userData.security?.httpsConnection === 'Yes' ? '<span class="badge safe">Yes</span>' : '<span class="badge danger">No</span>'}
                                </div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">VPN/Proxy Detected</div>
                                <div class="info-value ${String(this.userData.network?.is_vpn).includes('Yes') || String(this.userData.network?.is_proxy).includes('Yes') ? 'warning' : 'positive'}">
                                    ${(String(this.userData.network?.is_vpn).includes('Yes') || String(this.userData.network?.is_proxy).includes('Yes')) ? '<span class="badge warning">Yes</span>' : '<span class="badge safe">No</span>'}
                                </div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Tor Detected</div>
                                <div class="info-value ${String(this.userData.network?.is_tor).includes('Yes') ? 'negative' : 'positive'}">
                                    ${String(this.userData.network?.is_tor).includes('Yes') ? '<span class="badge danger">Yes</span>' : '<span class="badge safe">No</span>'}
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                if (this.userData.device?.userAgent) {
                    html += `
                        <h2><span class="icon">📋</span> System Signature</h2>
                        <div class="code-block">${this.userData.device.userAgent}</div>
                    `;
                }
                
                this.statsContent.innerHTML = html;
                this.statsBox.style.display = 'block';
                this.loading.style.display = 'none';
                this.result.innerHTML = '<div class="result success">✓ Verification completed successfully</div>';
                this.result.style.display = 'block';
            }
            
            showError(message) {
                this.result.innerHTML = `<div class="result error">✗ ${message}</div>`;
                this.result.style.display = 'block';
                this.loading.style.display = 'none';
                this.verifyBtn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new SecurityVerification();
        });
    </script>
</body>
</html>
