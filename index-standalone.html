<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced User Intelligence System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .verification-box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            animation: slideIn 0.5s ease-out;
        }

        .stats-box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 30px;
            text-align: left;
            animation: slideIn 0.5s ease-out 0.2s both;
            max-height: 80vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 28px;
        }

        h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        h3 {
            color: #333;
            font-size: 16px;
            margin: 15px 0 10px 0;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
        }

        .button-container {
            margin: 30px 0;
        }

        .verify-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 50px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .verify-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
        }

        .verify-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-steps {
            text-align: left;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .step {
            display: flex;
            align-items: center;
            margin: 10px 0;
            font-size: 14px;
            color: #666;
        }

        .step-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 12px;
            font-weight: bold;
        }

        .step.completed .step-icon {
            background: #4CAF50;
        }

        .result {
            padding: 25px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 16px;
            font-weight: 600;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result.success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .info-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .info-row {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 20px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .info-label {
            font-weight: 600;
            color: #667eea;
        }

        .info-value {
            color: #333;
            word-break: break-all;
        }

        .info-value.positive {
            color: #4CAF50;
            font-weight: 600;
        }

        .info-value.negative {
            color: #f44336;
            font-weight: 600;
        }

        .info-value.warning {
            color: #ff9800;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 5px;
        }

        .badge.safe {
            background: #d4edda;
            color: #155724;
        }

        .badge.warning {
            background: #fff3cd;
            color: #856404;
        }

        .badge.danger {
            background: #f8d7da;
            color: #721c24;
        }

        .code-block {
            margin-top: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 12px;
            color: #333;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
        }

        @media (max-width: 600px) {
            .verification-box {
                padding: 25px;
            }
            h1 {
                font-size: 24px;
            }
            .verify-button {
                padding: 12px 40px;
                font-size: 14px;
            }
            .info-row {
                grid-template-columns: 1fr;
            }
            .info-label {
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="verification-box">
            <h1>🔍 Advanced User Intelligence</h1>
            <p>Umfassende Analyse aller verfügbaren Benutzerinformationen</p>
            
            <div class="button-container">
                <button id="verifyBtn" class="verify-button">📊 Analyse starten</button>
            </div>
            
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Sammle alle verfügbaren Informationen...</p>
                <div class="loading-steps">
                    <div class="step" id="step-1">
                        <div class="step-icon">1</div>
                        <span>Netzwerk-Informationen</span>
                    </div>
                    <div class="step" id="step-2">
                        <div class="step-icon">2</div>
                        <span>Geolokalisierung</span>
                    </div>
                    <div class="step" id="step-3">
                        <div class="step-icon">3</div>
                        <span>Geräte-Fingerprint</span>
                    </div>
                    <div class="step" id="step-4">
                        <div class="step-icon">4</div>
                        <span>Browser-Forensik</span>
                    </div>
                    <div class="step" id="step-5">
                        <div class="step-icon">5</div>
                        <span>Sicherheits-Analyse</span>
                    </div>
                </div>
            </div>
            
            <div id="result" class="result" style="display: none;"></div>
        </div>

        <div id="statsBox" class="stats-box" style="display: none;">
            <div id="statsContent"></div>
        </div>
    </div>

    <script>
        class AdvancedIntelligence {
            constructor() {
                this.verifyBtn = document.getElementById('verifyBtn');
                this.loading = document.getElementById('loading');
                this.result = document.getElementById('result');
                this.statsBox = document.getElementById('statsBox');
                this.statsContent = document.getElementById('statsContent');
                
                this.userData = {};
                this.init();
            }
            
            init() {
                this.verifyBtn.addEventListener('click', () => this.startAnalysis());
            }
            
            async startAnalysis() {
                this.verifyBtn.disabled = true;
                this.loading.style.display = 'block';
                this.result.style.display = 'none';
                this.statsBox.style.display = 'none';
                
                try {
                    // Schritt 1
                    this.updateStep(1);
                    await this.sleep(300);
                    await this.getNetworkInfo();
                    
                    // Schritt 2
                    this.updateStep(2);
                    await this.sleep(300);
                    await this.getGeoLocation();
                    
                    // Schritt 3
                    this.updateStep(3);
                    await this.sleep(300);
                    this.getDeviceFingerprint();
                    
                    // Schritt 4
                    this.updateStep(4);
                    await this.sleep(300);
                    this.getBrowserForensics();
                    
                    // Schritt 5
                    this.updateStep(5);
                    await this.sleep(300);
                    this.getSecurityAnalysis();
                    
                    this.displayResults();
                    
                } catch (error) {
                    console.error('Fehler:', error);
                    this.showError('Fehler bei der Analyse: ' + error.message);
                }
            }
            
            updateStep(number) {
                const step = document.getElementById('step-' + number);
                if (step) {
                    step.classList.add('completed');
                }
            }
            
            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
            
            async getNetworkInfo() {
                try {
                    const response = await fetch('https://ipapi.co/json/');
                    const data = await response.json();
                    
                    this.userData.network = {
                        ip: data.ip,
                        isp: data.org,
                        country: data.country_name,
                        country_code: data.country_code,
                        region: data.region,
                        city: data.city,
                        latitude: data.latitude,
                        longitude: data.longitude,
                        timezone: data.timezone,
                        postal: data.postal,
                        asn: data.asn,
                        languages: data.languages,
                        is_vpn: data.is_vpn ? 'JA ⚠️' : 'NEIN ✓',
                        is_proxy: data.is_proxy ? 'JA ⚠️' : 'NEIN ✓',
                        is_tor: data.is_tor ? 'JA ⚠️' : 'NEIN ✓',
                        is_datacenter: data.is_datacenter ? 'JA ⚠️' : 'NEIN ✓',
                        connection_type: data.connection_type,
                        currency: data.currency_code
                    };
                } catch (error) {
                    this.userData.network = { error: 'API nicht erreichbar' };
                }
            }
            
            async getGeoLocation() {
                return new Promise((resolve) => {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                this.userData.gps = {
                                    latitude: position.coords.latitude.toFixed(6),
                                    longitude: position.coords.longitude.toFixed(6),
                                    accuracy: Math.round(position.coords.accuracy) + 'm',
                                    altitude: position.coords.altitude ? Math.round(position.coords.altitude) + 'm' : 'N/A',
                                    altitudeAccuracy: position.coords.altitudeAccuracy ? Math.round(position.coords.altitudeAccuracy) + 'm' : 'N/A',
                                    heading: position.coords.heading ? Math.round(position.coords.heading) + '°' : 'N/A',
                                    speed: position.coords.speed ? Math.round(position.coords.speed * 3.6) + ' km/h' : 'N/A',
                                    timestamp: new Date(position.timestamp).toLocaleString('de-DE')
                                };
                                resolve();
                            },
                            (error) => {
                                this.userData.gps = { 
                                    status: 'Berechtigung verweigert',
                                    error: error.message 
                                };
                                resolve();
                            },
                            { timeout: 5000, enableHighAccuracy: true }
                        );
                    } else {
                        this.userData.gps = { status: 'Nicht unterstützt' };
                        resolve();
                    }
                });
            }
            
            getDeviceFingerprint() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillText('🔐', 2, 2);
                const canvasHash = canvas.toDataURL().substring(0, 50);
                
                this.userData.device = {
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    hardwareConcurrency: navigator.hardwareConcurrency || 'Unbekannt',
                    deviceMemory: navigator.deviceMemory ? navigator.deviceMemory + 'GB' : 'Unbekannt',
                    maxTouchPoints: navigator.maxTouchPoints,
                    vendor: navigator.vendor,
                    language: navigator.language,
                    languages: navigator.languages.join(', '),
                    screenWidth: window.screen.width,
                    screenHeight: window.screen.height,
                    colorDepth: window.screen.colorDepth + '-bit',
                    pixelDepth: window.screen.pixelDepth + '-bit',
                    devicePixelRatio: window.devicePixelRatio,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    canvasFingerprint: canvasHash,
                    plugins: this.getPlugins(),
                    webGL: this.getWebGLInfo()
                };
            }
            
            getPlugins() {
                const plugins = [];
                for (let i = 0; i < navigator.plugins.length; i++) {
                    plugins.push(navigator.plugins[i].name);
                }
                return plugins.length > 0 ? plugins.join(', ') : 'Keine';
            }
            
            getWebGLInfo() {
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        if (debugInfo) {
                            return {
                                vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL),
                                renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)
                            };
                        }
                    }
                    return 'Nicht verfügbar';
                } catch (e) {
                    return 'Nicht verfügbar';
                }
            }
            
            getBrowserForensics() {
                this.userData.browser = {
                    cookieEnabled: navigator.cookieEnabled,
                    doNotTrack: navigator.doNotTrack,
                    onLine: navigator.onLine,
                    connectionType: navigator.connection?.effectiveType || 'Unbekannt',
                    bandwidth: navigator.connection?.downlink ? navigator.connection.downlink + ' Mbps' : 'Unbekannt',
                    saveData: navigator.connection?.saveData ? 'JA' : 'NEIN',
                    localStorage: this.checkLocalStorage(),
                    sessionStorage: this.checkSessionStorage(),
                    indexedDB: this.checkIndexedDB(),
                    serviceWorker: 'serviceWorker' in navigator ? 'JA' : 'NEIN',
                    notifications: 'Notification' in window ? 'JA' : 'NEIN',
                    geolocation: 'geolocation' in navigator ? 'JA' : 'NEIN',
                    vibration: 'vibrate' in navigator ? 'JA' : 'NEIN',
                    battery: 'getBattery' in navigator ? 'JA' : 'NEIN',
                    camera: navigator.mediaDevices !== undefined ? 'JA' : 'NEIN',
                    microphone: navigator.mediaDevices !== undefined ? 'JA' : 'NEIN',
                    webWorker: typeof(Worker) !== 'undefined' ? 'JA' : 'NEIN',
                    webSocket: 'WebSocket' in window ? 'JA' : 'NEIN',
                    webRTC: this.checkWebRTC()
                };
            }
            
            checkLocalStorage() {
                try {
                    const test = '__test__';
                    localStorage.setItem(test, test);
                    localStorage.removeItem(test);
                    return 'JA ✓';
                } catch(e) {
                    return 'NEIN';
                }
            }
            
            checkSessionStorage() {
                try {
                    const test = '__test__';
                    sessionStorage.setItem(test, test);
                    sessionStorage.removeItem(test);
                    return 'JA ✓';
                } catch(e) {
                    return 'NEIN';
                }
            }
            
            checkIndexedDB() {
                return !!window.indexedDB ? 'JA ✓' : 'NEIN';
            }
            
            checkWebRTC() {
                try {
                    const pc = new (window.RTCPeerConnection || window.webkitRTCPeerConnection)({iceServers: []});
                    pc.createDataChannel('');
                    const offer = pc.createOffer();
                    return 'JA ✓';
                } catch (e) {
                    return 'NEIN';
                }
            }
            
            getSecurityAnalysis() {
                const analysis = {
                    httpsConnection: location.protocol === 'https:' ? 'JA ✓' : 'NEIN ⚠️',
                    referrerPolicy: document.referrerPolicy || 'default',
                    securityHeaders: this.checkSecurityHeaders(),
                    publicIP: this.userData.network?.ip || 'Unbekannt',
                    vpnDetected: this.userData.network?.is_vpn || 'Unbekannt',
                    proxyDetected: this.userData.network?.is_proxy || 'Unbekannt',
                    torDetected: this.userData.network?.is_tor || 'Unbekannt',
                    dataCenterIP: this.userData.network?.is_datacenter || 'Unbekannt'
                };
                
                this.userData.security = analysis;
            }
            
            checkSecurityHeaders() {
                const headers = [];
                const headerList = ['X-Frame-Options', 'X-Content-Type-Options', 'Content-Security-Policy'];
                // Hinweis: Wir können nur diese Info von unserem Server bekommen
                return 'Abhängig vom Server';
            }
            
            displayResults() {
                let html = '';
                
                // NETZWERK-INFORMATIONEN
                if (this.userData.network && !this.userData.network.error) {
                    html += `
                        <h2>🌐 NETZWERKINFORMATIONEN</h2>
                        <div class="info-section">
                            <div class="info-row">
                                <div class="info-label">IP-Adresse:</div>
                                <div class="info-value">${this.userData.network.ip}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Internetdienstanbieter:</div>
                                <div class="info-value">${this.userData.network.isp}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">ASN:</div>
                                <div class="info-value">${this.userData.network.asn}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Verbindungstyp:</div>
                                <div class="info-value">${this.userData.network.connection_type || 'Unbekannt'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">VPN erkannt:</div>
                                <div class="info-value ${this.userData.network.is_vpn.includes('JA') ? 'warning' : 'positive'}">${this.userData.network.is_vpn}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Proxy erkannt:</div>
                                <div class="info-value ${this.userData.network.is_proxy.includes('JA') ? 'warning' : 'positive'}">${this.userData.network.is_proxy}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Tor erkannt:</div>
                                <div class="info-value ${this.userData.network.is_tor.includes('JA') ? 'danger' : 'positive'}">${this.userData.network.is_tor}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Rechenzentrum IP:</div>
                                <div class="info-value ${this.userData.network.is_datacenter.includes('JA') ? 'warning' : 'positive'}">${this.userData.network.is_datacenter}</div>
                            </div>
                        </div>
                    `;
                }
                
                // STANDORT-INFORMATIONEN
                if (this.userData.network && !this.userData.network.error) {
                    html += `
                        <h2>📍 STANDORTINFORMATIONEN</h2>
                        <div class="info-section">
                            <div class="info-row">
                                <div class="info-label">Land:</div>
                                <div class="info-value">${this.userData.network.country} (${this.userData.network.country_code})</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Region:</div>
                                <div class="info-value">${this.userData.network.region || 'Unbekannt'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Stadt:</div>
                                <div class="info-value">${this.userData.network.city || 'Unbekannt'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Postleitzahl:</div>
                                <div class="info-value">${this.userData.network.postal || 'Unbekannt'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Breitengrad:</div>
                                <div class="info-value">${this.userData.network.latitude.toFixed(4)}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Längengrad:</div>
                                <div class="info-value">${this.userData.network.longitude.toFixed(4)}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Zeitzone:</div>
                                <div class="info-value">${this.userData.network.timezone}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Währung:</div>
                                <div class="info-value">${this.userData.network.currency || 'Unbekannt'}</div>
                            </div>
                        </div>
                    `;
                }
                
                // GPS-STANDORT
                if (this.userData.gps && this.userData.gps.latitude) {
                    html += `
                        <h2>📡 GPS-STANDORT (mit Benutzer-Berechtigung)</h2>
                        <div class="info-section">
                            <div class="info-row">
                                <div class="info-label">Breitengrad:</div>
                                <div class="info-value">${this.userData.gps.latitude}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Längengrad:</div>
                                <div class="info-value">${this.userData.gps.longitude}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Genauigkeit:</div>
                                <div class="info-value">${this.userData.gps.accuracy}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Höhe:</div>
                                <div class="info-value">${this.userData.gps.altitude}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Geschwindigkeit:</div>
                                <div class="info-value">${this.userData.gps.speed}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Richtung:</div>
                                <div class="info-value">${this.userData.gps.heading}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Zeitstempel:</div>
                                <div class="info-value">${this.userData.gps.timestamp}</div>
                            </div>
                        </div>
                    `;
                }
                
                // GERÄTE-INFORMATIONEN
                if (this.userData.device) {
                    html += `
                        <h2>📱 GERÄTEINFORMATIONEN</h2>
                        <div class="info-section">
                            <div class="info-row">
                                <div class="info-label">Betriebssystem:</div>
                                <div class="info-value">${this.userData.device.platform}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">CPU Kerne:</div>
                                <div class="info-value">${this.userData.device.hardwareConcurrency}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Gerätespeicher (RAM):</div>
                                <div class="info-value">${this.userData.device.deviceMemory}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Bildschirmauflösung:</div>
                                <div class="info-value">${this.userData.device.screenWidth} x ${this.userData.device.screenHeight} px</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Farb-Tiefe:</div>
                                <div class="info-value">${this.userData.device.colorDepth}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">DPI (Pixel-Verhältnis):</div>
                                <div class="info-value">${this.userData.device.devicePixelRatio}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Touch-Punkte:</div>
                                <div class="info-value">${this.userData.device.maxTouchPoints}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Zeitzone:</div>
                                <div class="info-value">${this.userData.device.timezone}</div>
                            </div>
                        </div>
                    `;
                }
                
                // BROWSER-INFORMATIONEN
                if (this.userData.device) {
                    html += `
                        <h2>🌐 BROWSER-INFORMATIONEN</h2>
                        <div class="info-section">
                            <div class="info-row">
                                <div class="info-label">Browser Vendor:</div>
                                <div class="info-value">${this.userData.device.vendor}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Sprache:</div>
                                <div class="info-value">${this.userData.device.language}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Alle Sprachen:</div>
                                <div class="info-value">${this.userData.device.languages}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Browser Plugins:</div>
                                <div class="info-value">${this.userData.device.plugins}</div>
                            </div>
                        </div>
                    `;
                }
                
                // BROWSER-FUNKTIONEN
                if (this.userData.browser) {
                    html += `
                        <h2>⚙️ BROWSER-FUNKTIONEN</h2>
                        <div class="info-section">
                            <div class="info-row">
                                <div class="info-label">Cookies aktiviert:</div>
                                <div class="info-value ${this.userData.browser.cookieEnabled ? 'positive' : 'negative'}">${this.userData.browser.cookieEnabled ? 'JA ✓' : 'NEIN'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Online Status:</div>
                                <div class="info-value ${this.userData.browser.onLine ? 'positive' : 'negative'}">${this.userData.browser.onLine ? 'ONLINE ✓' : 'OFFLINE'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Verbindungstyp:</div>
                                <div class="info-value">${this.userData.browser.connectionType}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Bandbreite:</div>
                                <div class="info-value">${this.userData.browser.bandwidth}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Datensparmodell:</div>
                                <div class="info-value">${this.userData.browser.saveData}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">LocalStorage:</div>
                                <div class="info-value positive">${this.userData.browser.localStorage}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">SessionStorage:</div>
                                <div class="info-value positive">${this.userData.browser.sessionStorage}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">IndexedDB:</div>
                                <div class="info-value positive">${this.userData.browser.indexedDB}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Service Worker:</div>
                                <div class="info-value">${this.userData.browser.serviceWorker}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Geolocation API:</div>
                                <div class="info-value">${this.userData.browser.geolocation}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Web Worker:</div>
                                <div class="info-value">${this.userData.browser.webWorker}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">WebSocket:</div>
                                <div class="info-value">${this.userData.browser.webSocket}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">WebRTC:</div>
                                <div class="info-value">${this.userData.browser.webRTC}</div>
                            </div>
                        </div>
                    `;
                }
                
                // SICHERHEITS-ANALYSE
                if (this.userData.security) {
                    html += `
                        <h2>🔐 SICHERHEITS-ANALYSE</h2>
                        <div class="info-section">
                            <div class="info-row">
                                <div class="info-label">HTTPS:</div>
                                <div class="info-value ${this.userData.security.httpsConnection.includes('JA') ? 'positive' : 'negative'}">${this.userData.security.httpsConnection}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">VPN/Proxy erkannt:</div>
                                <div class="info-value ${this.userData.network?.is_vpn.includes('JA') || this.userData.network?.is_proxy.includes('JA') ? 'warning' : 'positive'}">
                                    ${(this.userData.network?.is_vpn.includes('JA') || this.userData.network?.is_proxy.includes('JA')) ? 'JA ⚠️' : 'NEIN ✓'}
                                </div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Tor erkannt:</div>
                                <div class="info-value ${this.userData.network?.is_tor.includes('JA') ? 'danger' : 'positive'}">${this.userData.network?.is_tor || 'NEIN ✓'}</div>
                            </div>
                        </div>
                    `;
                }
                
                // USER AGENT
                if (this.userData.device) {
                    html += `
                        <h2>📋 USER AGENT</h2>
                        <div class="code-block">${this.userData.device.userAgent}</div>
                    `;
                }
                
                this.statsContent.innerHTML = html;
                this.statsBox.style.display = 'block';
                this.loading.style.display = 'none';
                this.result.innerHTML = '<div class="result success">✓ Analyse erfolgreich abgeschlossen! Alle verfügbaren Informationen wurden erfasst.</div>';
                this.result.style.display = 'block';
            }
            
            showError(message) {
                this.result.innerHTML = `<div class="result" style="background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb;">✗ ${message}</div>`;
                this.result.style.display = 'block';
                this.loading.style.display = 'none';
                this.verifyBtn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new AdvancedIntelligence();
        });
    </script>
</body>
</html>
